name: Build & Test
on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'README.md'
  schedule:
    - cron: '0 13 * * *'
  repository_dispatch:
    types: [deploy-success]

jobs:
  build:
    name: Go build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'
      id: go
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6
    - name: Get dependencies
      run: |
        go mod download
    - name: Build
      run: |
        go build -v .

  generate:
    name: Go generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - uses: actions/checkout@v6
      - run: go generate ./...
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'go generate ./...' command and commit."; exit 1)

  # run acceptance tests in a matrix with Terraform core versions
  test:
    name: Matrix test
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
#           - '0.12.*'
#           - '0.13.*'
#           - '0.14.*'
          - '0.15.*'
#           - '1.0.*'
          - '1.1.*'
    steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'
      id: go

    - uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ matrix.terraform }}
        terraform_wrapper: false

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Get dependencies
      run: |
        go mod download

    - name: Set up gotestfmt
      uses: gotesttools/gotestfmt-action@v2

    - name: TF acceptance tests
      timeout-minutes: 10
      # Limit parallelism to 4 to avoid hitting Checkly API rate limits.
      # Use -json piped to tee + gotestfmt for real-time streaming output
      # in CI while also saving the raw log as an artifact.
      run: |
        set -euo pipefail
        go test -v -parallel 4 -json ./... 2>&1 | tee /tmp/gotest.log | gotestfmt
      env:
        TF_ACC: "1"
        TF_VAR_checkly_api_key: ${{ secrets.CHECKLY_API_KEY }}
        TF_VAR_checkly_account_id: ${{ secrets.CHECKLY_ACCOUNT_ID }}
        CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
        CHECKLY_API_URL: ${{ secrets.CHECKLY_API_URL }}
        CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}

    - name: Sanitize artifact name
      id: artifact-name
      if: always()
      uses: actions/github-script@v8
      with:
        result-encoding: string
        script: |
          const tf = '${{ matrix.terraform }}'.replace('.*', '.x')
          return `test-log-tf-${tf}`

    - name: Upload test log
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: ${{ steps.artifact-name.outputs.result }}
        path: /tmp/gotest.log
        if-no-files-found: error
